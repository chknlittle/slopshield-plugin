<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlopShield</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">S</span>
          <div>
            <h1>SlopShield</h1>
            <p class="subtitle">YouTube AI filter</p>
          </div>
        </div>
        <label class="switch" aria-label="Enable SlopShield">
          <input id="enabled" type="checkbox" />
          <span class="switch-track"><span class="switch-knob"></span></span>
        </label>
      </header>

      <section class="status-panel" aria-live="polite">
        <div class="status-copy">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Checking engine…</span>
        </div>
        <span id="latency" class="latency">—</span>
      </section>

      <section class="counter-panel">
        <p class="counter-label">AI videos hidden on this page</p>
        <p id="blockedCount" class="counter">00</p>
      </section>

      <footer>
        <span>SlopShield API · Cloudflare</span>
        <span class="version">v0.4</span>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
